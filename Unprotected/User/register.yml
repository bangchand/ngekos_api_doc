info:
  name: register
  type: http
  seq: 1

http:
  method: post
  url: "{{baseUrl}}{{unprotected}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Admin User",
        "email": "admin@example.com",
        "password": "Secret123#",
        "passwordConfirm": "Password123!",
        "role": "ADMIN" // ADMIN, USER, OWNER
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (body.status && body.data?.token) {
          bru.setEnvVar("token", body.data.token);
          console.log("Token saved");
        } else {
          console.log("No token found");
        }

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

