info:
  name: login
  type: http
  seq: 2

http:
  method: post
  url: "{{baseUrl}}{{unprotected}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "admin@example.com",
        "password": "Secret123#"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (body.status && body.data?.token) {
          bru.setEnvVar("token", body.data.token);
          console.log("Token saved");
        } else {
          console.log("No token found");
        }

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{baseUrl}}{{unprotected}}/auth/login"
      method: post
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "email": "admin@example.com",
            "password": "Secret123#"
          }
    response:
      status: 200
      statusText: OK
